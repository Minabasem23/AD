<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini MO Wallet</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
.wallet-container {
  background: rgba(0,0,0,0.35);
  padding: 25px;
  border-radius: 20px;
  width: 360px;
}
h1,h2{text-align:center;}
button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #ffd700;
  color: #222;
  font-weight: bold;
}
button:hover { background: #ffec50; }
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
}
.hidden { display: none; }
pre {
  background: rgba(0,0,0,0.2);
  padding: 10px;
  border-radius: 12px;
  word-wrap: break-word;
}
</style>
</head>

<body>
<div class="wallet-container">
  <h2>Mini MO Wallet</h2>

  <p>Balance: <b><span id="balance">0</span></b> MO</p>
  <p>Ads watched: <span id="ads">0</span></p>

  <button id="watchBtn">Watch Ad</button>
  <p id="status" class="hidden"></p>

  <hr>

  <input type="number" id="withdrawAmount" placeholder="Enter phone number">
  <button id="withdrawBtn">Withdraw 10 MO</button>

  <pre id="withdrawCode"></pre>
</div>

<script>
// ===== Load data from LocalStorage =====
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let adsWatched = parseInt(localStorage.getItem("adsWatched")) || 0;

document.getElementById("balance").textContent = balance;
document.getElementById("ads").textContent = adsWatched;

const REWARD = 1; // 1 MO per ad
const WITHDRAW_AMOUNT = 10;

// ===== Watch Ad =====
document.getElementById("watchBtn").onclick = () => {
  balance += REWARD;
  adsWatched++;
  localStorage.setItem("balance", balance);
  localStorage.setItem("adsWatched", adsWatched);

  document.getElementById("balance").textContent = balance;
  document.getElementById("ads").textContent = adsWatched;

  const status = document.getElementById("status");
  status.textContent = `+${REWARD} MO`;
  status.classList.remove("hidden");
  setTimeout(() => status.classList.add("hidden"), 2000);
};

// ===== Withdraw =====
document.getElementById("withdrawBtn").onclick = () => {
  if(balance < WITHDRAW_AMOUNT){
    alert("❌ Not enough balance (needs 10 MO)");
    return;
  }

  const phone = document.getElementById("withdrawAmount").value;
  if(!phone){
    alert("❌ Enter phone number");
    return;
  }

  const password = prompt("Enter password");

  // خصم الرصيد
  balance -= WITHDRAW_AMOUNT;
  localStorage.setItem("balance", balance);
  document.getElementById("balance").textContent = balance;

  // ===== hidden calc =====
  const now = new Date();
  const TIME = now.getMonth()+1 + "" + now.getDate() + "" + now.getHours() +
               "" + now.getMinutes() + "" + now.getSeconds() + "" + now.getMilliseconds();
  const x = Math.floor(Math.random()*100)+1;
  const calc = Math.floor(TIME / x);
  const hidden = btoa(calc + "-" + x);

  // ===== output =====
  const withdrawCode = `${hidden}_${phone}-${password}`;
  document.getElementById("withdrawCode").textContent = "Your Code: " + withdrawCode;

  document.getElementById("withdrawAmount").value = "";
};
</script>
</body>
</html>
