<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini MO Wallet</title>

<!-- Adsgram SDK -->
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wallet{
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:20px;
width:340px;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ffee55;
}

.status{
margin-top:10px;
opacity:0.9;
}

</style>

</head>

<body>

<div class="wallet">

<h2>Mini MO Wallet</h2>

<p>Balance: <b><span id="balance">0</span></b> MO</p>
<p>Ads watched: <span id="ads">0</span></p>

<button id="watchAd">Watch Adsgram Ad</button>

<p class="status" id="status"></p>

</div>

<script>

// ===== Adsgram init =====
const AdController = window.Adsgram.init({
blockId:"int-25149",
debug:true
})

// ===== Wallet Storage =====
let wallet = JSON.parse(localStorage.getItem("wallet")) || {
balance:0,
ads:0
}

let balance = wallet.balance
let ads = wallet.ads

updateUI()

function updateUI(){

document.getElementById("balance").textContent = balance
document.getElementById("ads").textContent = ads

localStorage.setItem("wallet",JSON.stringify({
balance:balance,
ads:ads
}))

}

// ===== Prevent spam clicks =====
let adRunning = false

document.getElementById("watchAd").onclick = async ()=>{

if(adRunning){
alert("Wait for the current ad")
return
}

adRunning = true
document.getElementById("status").textContent="Loading ad..."

try{

const result = await AdController.show()

if(result.done){

balance += 1
ads += 1

updateUI()

document.getElementById("status").textContent="✅ You earned 1 MO"

}else{

document.getElementById("status").textContent="Ad skipped"

}

}catch(err){

console.log(err)

document.getElementById("status").textContent="❌ No ads available"

}

adRunning = false

}

</script>

</body>
</html>
