<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini USDT Wallet</title>

<!-- Telegram SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Monetag SDK -->
<script src="//libtl.com/sdk.js"
        data-zone="10638478"
        data-sdk="show_10638478"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
.wallet-container {
  background: rgba(0,0,0,0.35);
  padding: 25px;
  border-radius: 20px;
  width: 360px;
}
h1,h2{text-align:center;}
button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #ffd700;
  color: #222;
  font-weight: bold;
}
button:hover { background: #ffec50; }
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
}
.hidden { display: none; }
pre {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  overflow-x: auto;
}
.copy-btn {
  background: #00cc66;
  color: #fff;
  margin-top: 5px;
}
.copy-btn:hover { background: #00ff88; }
</style>
</head>

<body>
<div class="wallet-container">
  <h2>Mini USDT Wallet</h2>

  <p>ID: <span id="uid">---</span></p>
  <p>Balance: <b><span id="balance">0</span></b> MO</p>
  <p>Ads watched: <span id="ads">0</span></p>

  <button id="watchBtn">Watch Ad</button>
  <p id="status" class="hidden"></p>

  <hr>

  <input type="number" id="withdrawAmount" placeholder="Enter your phone (N)">
  <button id="withdrawBtn">Withdraw 10 MO</button>

  <pre id="withdrawCode"></pre>
  <button id="copyBtn" class="copy-btn hidden">Copy Code</button>
</div>

<script>
// ===== Telegram Web App ready =====
Telegram.WebApp?.ready();

// ===== المتغيرات =====
let uid = "user_" + Math.floor(Math.random()*1000000);
document.getElementById("uid").textContent = uid;

let balance = 0;
let adsWatched = 0;

const REWARD = 1;       // كل اعلان = 1 MO
const WITHDRAW_AMOUNT = 10;

// ===== مشاهدة إعلان =====
document.getElementById("watchBtn").onclick = async () => {
  if (typeof show_10638478 !== "function") {
    alert("SDK لم يتم تحميله");
    return;
  }

  const status = document.getElementById("status");
  status.textContent = "⏳ Watching ad...";
  status.classList.remove("hidden");

  try {
    await show_10638478({ ymid: uid });
  } catch {
    status.textContent = "❌ لا يوجد إعلان متاح";
    setTimeout(() => status.classList.add("hidden"), 2000);
    return;
  }

  balance += REWARD;
  adsWatched++;

  document.getElementById("balance").textContent = balance;
  document.getElementById("ads").textContent = adsWatched;

  status.textContent = `+${REWARD} MO`;
  setTimeout(() => status.classList.add("hidden"), 2000);
};

// ===== سحب الرصيد 10 MO لكل رقم =====
document.getElementById("withdrawBtn").onclick = () => {
  if(balance < WITHDRAW_AMOUNT){
    alert("رصيد غير كافي (10 MO required)");
    return;
  }

  const phone = document.getElementById("withdrawAmount").value;
  if(!phone){
    alert("❌ ادخل رقم الهاتف (N)");
    return;
  }

  const password = prompt("Enter password (P)");

  balance -= WITHDRAW_AMOUNT;
  document.getElementById("balance").textContent = balance;

  // ===== الوقت حتى الملي ثانية =====
  const now = new Date();
  const TIME =
    (now.getMonth()+1) +
    "" + now.getDate() +
    "" + now.getHours() +
    "" + now.getMinutes() +
    "" + now.getSeconds() +
    "" + now.getMilliseconds();

  const x = Math.floor(Math.random() * 100) + 1;
  const result = Math.floor(TIME / x);

  const code = `Calc.${x}_${phone}-${password}`;

  const withdrawCode = document.getElementById("withdrawCode");
  withdrawCode.textContent = `Your Code: ${code}\ncalc=${result}`;

  // اظهار زر النسخ
  const copyBtn = document.getElementById("copyBtn");
  copyBtn.classList.remove("hidden");

  copyBtn.onclick = () => {
    navigator.clipboard.writeText(code).then(()=>{
      alert("✅ Code copied!");
    });
  };

  document.getElementById("withdrawAmount").value = "";
};
</script>
</body>
</html>
