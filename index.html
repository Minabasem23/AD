<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini MO Wallet - Adsgram</title>

<!-- Adsgram SDK -->
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.wallet {
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #ffd700;
  font-weight: bold;
  cursor: pointer;
}
button:hover { background: #ffee55; }
</style>
</head>
<body>

<div class="wallet">
  <h2>Mini MO Wallet</h2>
  <p>Balance: <span id="balance">0</span> MO</p>
  <p>Ads watched: <span id="ads">0</span></p>
  <button id="watchAd">Watch Adsgram Ad</button>
</div>

<script>
// ===== initialize Adsgram =====
const AdController = window.Adsgram.init({
  blockId: "int-25177"  // معرف البلوك الخاص بك
});

// ===== wallet storage =====
let wallet = JSON.parse(localStorage.getItem("wallet")) || { balance:0, ads:0 };
let balance = wallet.balance;
let ads = wallet.ads;

function updateUI(){
  document.getElementById("balance").textContent = balance;
  document.getElementById("ads").textContent = ads;
  localStorage.setItem("wallet", JSON.stringify({ balance, ads }));
}

// ===== show ad button =====
document.getElementById("watchAd").onclick = () => {
  AdController.show()
    .then(result => {
      if(result.done){
        balance += 1; // كل إعلان = 1 MO
        ads += 1;
        updateUI();
        alert("✅ You earned 1 MO!");
      }
    })
    .catch(()=>{
      alert("❌ No ads available or error loading ad");
    });
};

// تحديث واجهة المستخدم عند فتح الصفحة
updateUI();
</script>

</body>
</html>
