<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini USDT Wallet</title>

<!-- Telegram SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Monetag SDK -->
<script src="//libtl.com/sdk.js"
        data-zone="10638478"
        data-sdk="show_10638478"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
.wallet-container {
  background: rgba(0,0,0,0.35);
  padding: 25px;
  border-radius: 20px;
  width: 360px;
}
h1,h2{text-align:center;}
button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #ffd700;
  color: #222;
  font-weight: bold;
}
button:hover { background: #ffec50; }
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
}
.hidden { display: none; }
</style>
</head>

<body>
<div class="wallet-container">
  <h2>Mini USDT Wallet</h2>

  <p>ID: <span id="uid">---</span></p>
  <p>Balance: <b><span id="balance">0.000000</span></b> USDT</p>
  <p>Ads watched: <span id="ads">0</span></p>

  <button id="watchBtn">Watch Ad</button>
  <p id="status" class="hidden"></p>

  <hr>

  <input type="number" id="withdrawAmount" placeholder="Min 0.1 USDT">
  <button id="withdrawBtn">Withdraw</button>

  <pre id="withdrawCode"></pre>
</div>

<script>
// ===== Telegram Web App ready =====
Telegram.WebApp.ready();

// ===== المتغيرات =====
let uid = "user_" + Math.floor(Math.random()*1000000);
document.getElementById("uid").textContent = uid;

let balance = 0;
let adsWatched = 0;
const rewardPerAd = 0.0002;

// ===== مشاهدة إعلان =====
document.getElementById("watchBtn").onclick = async () => {
  if (typeof show_10638478 !== "function") {
    alert("SDK لم يتم تحميله");
    return;
  }

  try {
    await show_10638478({ ymid: uid });
  } catch {
    alert("لا يوجد إعلان متاح");
    return;
  }

  // ✅ زيادة الرصيد مرة واحدة لكل إعلان
  balance += rewardPerAd;
  adsWatched++;

  document.getElementById("balance").textContent = balance.toFixed(6);
  document.getElementById("ads").textContent = adsWatched;

  const status = document.getElementById("status");
  status.textContent = `+${rewardPerAd.toFixed(6)} USDT`;
  status.classList.remove("hidden");
  setTimeout(() => status.classList.add("hidden"), 2000);
};

// ===== سحب الرصيد =====
document.getElementById("withdrawBtn").onclick = () => {
  const amount = parseFloat(document.getElementById("withdrawAmount").value);
  if (!amount || amount > balance || amount < 0.1) {
    alert("المبلغ غير صالح أو أقل من الحد الأدنى 0.1 USDT");
    return;
  }

  balance -= amount;
  document.getElementById("balance").textContent = balance.toFixed(6);

  const code = btoa(amount + "|" + Date.now());
  document.getElementById("withdrawCode").textContent = "Withdraw Code:\n" + code;
};
</script>
</body>
</html>
