<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini MO Wallet</title>

<!-- Telegram SDK (إن أردت لاحقًا) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Monetag SDK (إن أردت لاحقًا) -->
<script src="//libtl.com/sdk.js" data-zone="10638478" data-sdk="show_10638478"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
.wallet-container {
  background: rgba(0,0,0,0.35);
  padding: 25px;
  border-radius: 20px;
  width: 360px;
}
h1,h2{text-align:center;}
button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #ffd700;
  color: #222;
  font-weight: bold;
}
button:hover { background: #ffec50; }
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
}
.hidden { display: none; }
pre {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  overflow-x: auto;
}
.copy-btn {
  background: #00cc66;
  color: #fff;
  margin-top: 5px;
}
.copy-btn:hover { background: #00ff88; }
</style>
</head>

<body>
<div class="wallet-container">
  <h2>Mini MO Wallet</h2>

  <p>Balance: <b><span id="balance">0</span></b> MO</p>
  <p>Ads watched: <span id="ads">0</span></p>

  <button id="watchBtn">Watch Ad</button>
  <p id="status" class="hidden"></p>

  <hr>

  <input type="text" id="withdrawAmount" placeholder="Enter phone number (012xxxxxxxx)">
  <button id="withdrawBtn">Withdraw 10 MO</button>

  <pre id="withdrawCode"></pre>
  <button id="copyBtn" class="copy-btn hidden">Copy Code</button>
</div>

<script>
// ===== إعداد LocalStorage =====
let wallet = JSON.parse(localStorage.getItem("wallet")) || { balance: 0, adsWatched: 0 };
let balance = wallet.balance;
let adsWatched = wallet.adsWatched;
document.getElementById("balance").textContent = balance;
document.getElementById("ads").textContent = adsWatched;

// ===== مشاهدة إعلان =====
const REWARD = 1; // كل إعلان = 1 MO
document.getElementById("watchBtn").onclick = async () => {
  if (typeof show_10638478 !== "function") {
    alert("SDK لم يتم تحميله");
    return;
  }

  const status = document.getElementById("status");
  status.textContent = "⏳ Watching ad...";
  status.classList.remove("hidden");

  try {
    await show_10638478({ ymid: "ad_dummy" });
  } catch {
    status.textContent = "❌ لا يوجد إعلان متاح";
    setTimeout(() => status.classList.add("hidden"), 2000);
    return;
  }

  balance += REWARD;
  adsWatched++;

  document.getElementById("balance").textContent = balance;
  document.getElementById("ads").textContent = adsWatched;

  // حفظ في LocalStorage
  localStorage.setItem("wallet", JSON.stringify({ balance, adsWatched }));

  status.textContent = `+${REWARD} MO`;
  setTimeout(() => status.classList.add("hidden"), 2000);
};

// ===== توليد رمز عشوائي =====
function generateCode(len = 12){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
  let code = "";
  for(let i=0;i<len;i++){
    code += chars.charAt(Math.floor(Math.random()*chars.length));
  }
  return code;
}

// ===== سحب الرصيد =====
const WITHDRAW_AMOUNT = 10;
document.getElementById("withdrawBtn").onclick = () => {
  if(balance < WITHDRAW_AMOUNT){
    alert("رصيد غير كافي (10 MO required)");
    return;
  }

  const phone = document.getElementById("withdrawAmount").value;
  if(!/^012\d{9}$/.test(phone)){
    alert("❌ Sorry, you don't enter the orange number");
    return;
  }

  const password = prompt("Enter password (P)");
  if(!password){
    alert("❌ Password required");
    return;
  }

  balance -= WITHDRAW_AMOUNT;
  document.getElementById("balance").textContent = balance;
  localStorage.setItem("wallet", JSON.stringify({ balance, adsWatched }));

  const code = generateCode(12);
  const withdrawCode = document.getElementById("withdrawCode");
  withdrawCode.textContent = `Your Code: ${code}_${phone}-${password}`;

  const copyBtn = document.getElementById("copyBtn");
  copyBtn.classList.remove("hidden");
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(withdrawCode.textContent).then(()=>{
      alert("✅ Code copied!");
    });
  };

  document.getElementById("withdrawAmount").value = "";
};
</script>
</body>
</html>
