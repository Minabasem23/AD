<!DOCTYPE html>
<html>
<head>
  <title>Watch Ad</title>
  <script src="//libtl.com/sdk.js"
    data-zone="10638478"
    data-sdk="show_10638478"></script>
</head>
<body>

<button onclick="watchAd()">Watch Ad</button>

<script>
const userId = new URLSearchParams(location.search).get("uid");
let startTime = 0;

async function watchAd() {
  startTime = Date.now();

  try {
    await show_10638478();
  } catch {
    alert("No ad");
    return;
  }

  const watchedTime = (Date.now() - startTime) / 1000;

  if (watchedTime < 15) {
    alert("You must wait 15 seconds");
    return;
  }

  fetch("https://YOUR-HF-SPACE.hf.space/reward", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ user_id: userId })
  });

  alert("Reward added!");
}
</script>
</body>
</html>
