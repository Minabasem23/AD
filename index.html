<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini MO Wallet</title>

<!-- Telegram SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Monetag SDK -->
<script src="//libtl.com/sdk.js"
data-zone="10638478"
data-sdk="show_10638478"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:#fff;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:20px;
}

.wallet-container{
background:rgba(0,0,0,0.4);
padding:30px;
border-radius:20px;
width:360px;
}

h2{
text-align:center;
}

button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:none;
font-size:16px;
cursor:pointer;
background:#ffd700;
color:#222;
font-weight:bold;
}

button:hover{
background:#ffec50;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:12px;
border:none;
}

.hidden{
display:none;
}

pre{
background:#000;
padding:10px;
border-radius:10px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="wallet-container">

<h2>Mini MO Wallet</h2>

<p>ID: <span id="uid">---</span></p>

<p>Balance: <b><span id="balance">0</span></b> MO</p>

<p>Ads watched: <span id="ads">0</span></p>

<button id="watchBtn">Watch Ad</button>

<p id="status" class="hidden"></p>

<hr>

<input id="withdrawAmount" type="number" placeholder="Minimum 10 MO">

<button id="withdrawBtn">Withdraw</button>

<pre id="withdrawCode"></pre>

</div>

<script>

// Telegram ready
if(window.Telegram){
Telegram.WebApp.ready();
}

// ===== user id =====

let uid="user_"+Math.floor(Math.random()*1000000);

document.getElementById("uid").textContent=uid;


// ===== wallet =====

let balance=0;
let adsWatched=0;

const REWARD=1;
const MIN_WITHDRAW=10;

let withdrawCount=0;


// ===== watch ad =====

document.getElementById("watchBtn").onclick=async()=>{

if(typeof show_10638478!=="function"){
alert("Ad SDK not loaded");
return;
}

try{

await show_10638478({ymid:uid});

}catch{

alert("No ad available");
return;

}

// reward

balance+=REWARD;

adsWatched++;

document.getElementById("balance").textContent=balance;

document.getElementById("ads").textContent=adsWatched;

const status=document.getElementById("status");

status.textContent="+1 MO";

status.classList.remove("hidden");

setTimeout(()=>{
status.classList.add("hidden");
},2000);

};


// ===== withdraw =====

document.getElementById("withdrawBtn").onclick=()=>{

const amount=parseFloat(document.getElementById("withdrawAmount").value);

if(!amount||amount<MIN_WITHDRAW){

alert("Minimum withdraw is 10 MO");

return;

}

if(amount>balance){

alert("Not enough balance");

return;

}

// phone + password

const phone=prompt("Enter phone number (N)");

const password=prompt("Enter password (P)");

if(!phone||!password){

alert("Phone and password required");

return;

}

balance-=amount;

document.getElementById("balance").textContent=balance;

withdrawCount++;


// ===== TIME =====

const now=new Date();

const TIME=

(now.getMonth()+1)+

""+now.getDate()+

""+now.getHours()+

""+now.getMinutes()+

""+now.getSeconds()+

""+now.getMilliseconds();


// ===== random x =====

const x=Math.floor(Math.random()*100)+1;


// ===== calc =====

const result=Math.floor(TIME/x);


// ===== withdraw code =====

const code=`reslutes.${x}_${phone}-${password}`;


// ===== show code =====

document.getElementById("withdrawCode").textContent=

"Withdraw Code:\n"+

code+

"\n\ncalc="+result+

"\nWithdraw Number="+withdrawCount;

};

</script>

</body>
</html>
